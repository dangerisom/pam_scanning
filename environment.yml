name: pam_scanning
# Cross-platform environment that installs everything PAM-scanning needs:
# Python, the Tkinter GUI, NCBI BLAST+ (the 'blastn'/'makeblastdb' executables),
# and the pam_scanning package itself. Create it with:
#
#     conda env create -f environment.yml
#     conda activate pam_scanning
#     pam-scan-gui            # or: pam-scan --help
#
# (The double-click launchers in launchers/ do this for you.)
channels:
  - conda-forge
  - bioconda
dependencies:
  - python >=3.9
  - openpyxl
  - blast >=2.12        # NCBI BLAST+: provides blastn (and makeblastdb)
  - pip
  - pip:
      - .               # install pam_scanning -> the pam-scan / pam-scan-gui commands
